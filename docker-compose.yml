
services:
  # ─── Frontend ──────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - devsecops-net
    restart: unless-stopped

  # ─── Backend API ───────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=mongodb://mongo:27017/devsecops
      - JWT_SECRET=super_secret_jwt_key_2024
      - JWT_EXPIRES_IN=7d
      - AI_SERVICE_URL=http://ai-service:8000
      - FRONTEND_URL=http://localhost:3000
    depends_on:
      - mongo
    networks:
      - devsecops-net
    restart: unless-stopped

  # ─── MongoDB ───────────────────────────────────
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - devsecops-net
    restart: unless-stopped

  # ─── AI Anomaly Detection Service ──────────────
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    networks:
      - devsecops-net
    restart: unless-stopped

  # ─── NGINX Reverse Proxy ───────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
      - ai-service
    networks:
      - devsecops-net
    restart: unless-stopped

  # ─── Prometheus ────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    networks:
      - devsecops-net
    restart: unless-stopped

  # ─── Grafana ───────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_SERVER_ROOT_URL=http://localhost:3001
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    networks:
      - devsecops-net
    restart: unless-stopped

# ─── Volumes ────────────────────────────────────
volumes:
  mongo-data:
  prometheus-data:
  grafana-data:

# ─── Networks ───────────────────────────────────
networks:
  devsecops-net:
    driver: bridge
