
services:
  # ─── Frontend ──────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    # ports:
    #   - "3000:80"
    depends_on:
      - backend
    networks:
      - devsecops-net
    restart: unless-stopped

  # ─── Backend API ───────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=mongodb://mongo:27017/devsecops
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=7d
      - AI_SERVICE_URL=http://ai-service:8000
      - FRONTEND_URL=http://localhost:3000
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_REPOSITORY=${GITHUB_REPOSITORY}
    user: root # Needed to access /var/run/docker.sock
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock # Access to Docker API
    depends_on:
      - mongo
    networks:
      - devsecops-net
    restart: unless-stopped

  # ─── cAdvisor (Container Monitoring) ──────────
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    # ports:
    #   - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - devsecops-net
    restart: unless-stopped

  # ─── Node Exporter (System Monitoring) ────────
  node-exporter:
    image: prom/node-exporter:latest
    # ports:
    #   - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - --collector.filesystem.ignored-mount-points
      - "^/(sys|proc|dev|host|etc)($$|/)"
    networks:
      - devsecops-net
    restart: unless-stopped

  # ─── MongoDB ───────────────────────────────────
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - devsecops-net
    restart: unless-stopped

  # ─── AI Anomaly Detection Service ──────────────
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    networks:
      - devsecops-net
    restart: unless-stopped

  # ─── NGINX Reverse Proxy ───────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "3000:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
      - ai-service
    networks:
      - devsecops-net
    restart: unless-stopped

  # ─── Prometheus ────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    networks:
      - devsecops-net
    restart: unless-stopped

  # ─── Grafana ───────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_SERVER_ROOT_URL=http://localhost:3001
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    networks:
      - devsecops-net
    restart: unless-stopped

# ─── Volumes ────────────────────────────────────
volumes:
  mongo-data:
  prometheus-data:
  grafana-data:

# ─── Networks ───────────────────────────────────
networks:
  devsecops-net:
    driver: bridge
