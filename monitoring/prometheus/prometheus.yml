# Prometheus Configuration
global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files: []

scrape_configs:
  # Monitor Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Monitor Backend API
  - job_name: 'backend-api'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['backend:5000']
    scrape_interval: 10s

  # Monitor AI Service
  - job_name: 'ai-service'
    metrics_path: '/health'
    static_configs:
      - targets: ['ai-service:8000']

  # Monitor NGINX
  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx:80']

  # Node Exporter (optional - for host metrics)
  # - job_name: 'node-exporter'
  #   static_configs:
  #     - targets: ['node-exporter:9100']
